name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Pinned so CI formatting matches what the code was formatted with;
      # an unpinned Black drifts and reformats on every style release.
      - run: python -m pip install black==24.8.0
      - run: black --check --diff src/ tests/
      - uses: crate-ci/typos@master

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest -q --cov=pyomo_cvp --cov-report=term-missing

  min-deps:
    # Exercise the declared floors: oldest supported Python and the minimum
    # Pyomo (6.8.1 is where Block.private_data landed).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: python -m pip install -e ".[dev]"
      - run: python -m pip install "pyomo==6.8.1"
      - run: python -m pytest -q
